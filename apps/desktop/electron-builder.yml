appId: com.tinker.desktop
productName: Tinker
copyright: Copyright © 2024–2026 Tinker

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - dist/**/*

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"

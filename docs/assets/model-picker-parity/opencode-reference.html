<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenCode Model Picker Reference</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f4f0e8;
        --panel: rgba(255, 255, 255, 0.96);
        --panel-strong: #ffffff;
        --border: #d8d1c4;
        --border-soft: #e7e0d4;
        --ink: #231d15;
        --muted: #7d7468;
        --hover: #f1ece2;
        --shadow: 0 20px 50px rgba(28, 22, 15, 0.12);
        --tag-free-bg: #eef7e8;
        --tag-free-ink: #3f6931;
        --tag-latest-bg: #fef0cf;
        --tag-latest-ink: #7f5c03;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 42%),
          linear-gradient(180deg, #fbf8f2, var(--page));
        color: var(--ink);
        font-family:
          "Host Grotesk",
          "Helvetica Neue",
          sans-serif;
      }

      .frame {
        width: 760px;
        min-height: 520px;
        padding: 36px;
        border: 1px solid rgba(216, 209, 196, 0.7);
        border-radius: 28px;
        background: rgba(251, 248, 242, 0.86);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 0 0 22px;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      .workspace {
        position: relative;
        min-height: 380px;
        padding: 28px;
        border-radius: 22px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(249, 245, 236, 0.9));
        border: 1px solid var(--border-soft);
      }

      .composer {
        position: absolute;
        left: 28px;
        bottom: 28px;
        width: 360px;
        height: 84px;
        padding: 16px 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid var(--border-soft);
      }

      .trigger {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        max-width: 320px;
        padding: 4px 8px;
        border-radius: 999px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 500;
      }

      .provider-icon {
        width: 16px;
        height: 16px;
        flex: 0 0 auto;
        border-radius: 999px;
        background: linear-gradient(135deg, #1d1b18, #635a50);
        opacity: 0.55;
      }

      .chevron {
        width: 10px;
        height: 10px;
        margin-left: auto;
        border-right: 1.5px solid var(--muted);
        border-bottom: 1.5px solid var(--muted);
        transform: rotate(45deg) translateY(-2px);
      }

      .panel {
        position: absolute;
        left: 28px;
        bottom: 116px;
        width: 288px;
        height: 320px;
        padding: 8px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .search {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px;
        border-radius: 10px;
        background: #f4efe7;
        color: var(--muted);
        font-size: 14px;
      }

      .search svg {
        flex: 0 0 auto;
      }

      .search span {
        flex: 1 1 auto;
      }

      .action-row {
        display: inline-flex;
        gap: 4px;
      }

      .icon-button {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        border: 0;
        background: transparent;
        color: var(--muted);
      }

      .list {
        margin-top: 8px;
        height: calc(100% - 52px);
        overflow: hidden;
      }

      .group + .group {
        margin-top: 4px;
      }

      .group-title {
        position: relative;
        padding: 8px 12px 8px 8px;
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
        background: var(--panel);
      }

      .group-title::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -12px;
        height: 16px;
        background: linear-gradient(180deg, rgba(248, 244, 236, 0.92), rgba(248, 244, 236, 0));
      }

      .item {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        padding: 6px 8px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 500;
      }

      .item.active {
        background: var(--hover);
      }

      .item .name {
        flex: 1 1 auto;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        height: 20px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .tag.free {
        background: var(--tag-free-bg);
        color: var(--tag-free-ink);
      }

      .tag.latest {
        background: var(--tag-latest-bg);
        color: var(--tag-latest-ink);
      }

      .check {
        color: #1f6f46;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <p class="eyebrow">Pinned source reconstruction</p>
      <h1>OpenCode Desktop model picker</h1>
      <section class="workspace">
        <div class="panel" aria-label="Select model">
          <div class="search">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"></circle>
              <path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
            </svg>
            <span>Search models</span>
            <div class="action-row" aria-hidden="true">
              <div class="icon-button">+</div>
              <div class="icon-button">≡</div>
            </div>
          </div>

          <div class="list">
            <div class="group">
              <div class="group-title">OpenCode</div>
              <div class="item">
                <span class="name">Big Pickle</span>
                <span class="tag free">Free</span>
                <span class="tag latest">Latest</span>
              </div>
              <div class="item">
                <span class="name">GPT-5 Nano</span>
                <span class="tag free">Free</span>
              </div>
            </div>

            <div class="group">
              <div class="group-title">Anthropic</div>
              <div class="item active">
                <span class="name">Claude Sonnet 4</span>
                <span class="tag latest">Latest</span>
                <span class="check">✓</span>
              </div>
              <div class="item">
                <span class="name">Claude Opus 4</span>
              </div>
            </div>

            <div class="group">
              <div class="group-title">OpenAI</div>
              <div class="item">
                <span class="name">GPT-5</span>
                <span class="tag latest">Latest</span>
              </div>
            </div>
          </div>
        </div>

        <div class="composer">
          <div class="trigger" aria-hidden="true">
            <span class="provider-icon"></span>
            <span>Claude Sonnet 4</span>
            <span class="chevron"></span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

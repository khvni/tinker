name: Release macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-macos:
    name: Build signed macOS bundles
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="${RUNNER_TEMP}/tinker-signing.keychain-db"
          CERT_PATH="${RUNNER_TEMP}/certificate.p12"
          printf '%s' "${APPLE_CERTIFICATE}" | openssl base64 -d -A -out "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          CERT_ID="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | grep 'Developer ID Application' | head -n 1 | awk -F'"' '{print $2}')"
          if [[ -z "${CERT_ID}" ]]; then
            echo "Developer ID Application certificate not found in temporary keychain" >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=${CERT_ID}" >> "${GITHUB_ENV}"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_API_KEY:-}" ]]; then
            echo "Missing APPLE_API_KEY secret" >&2
            exit 1
          fi
          if [[ -z "${APPLE_API_KEY_BASE64:-}" ]]; then
            echo "Missing APPLE_API_KEY_BASE64 secret" >&2
            exit 1
          fi

          API_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "${APPLE_API_KEY_BASE64}" | openssl base64 -d -A -out "${API_KEY_PATH}"
          echo "APPLE_API_KEY_PATH=${API_KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Build signed app and DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: pnpm --filter @tinker/desktop tauri build --target universal-apple-darwin --bundles app,dmg

      - name: Notarize and staple macOS bundles
        env:
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: bash apps/desktop/scripts/notarize-macos-release.sh

      - name: Upload signed macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinker-macos-release
          if-no-files-found: error
          path: |
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/Tinker.app
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Clean up signing materials
        if: always()
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/tinker-signing.keychain-db"
          rm -f "${APPLE_API_KEY_PATH:-}"
          security delete-keychain "${KEYCHAIN_PATH}" || true

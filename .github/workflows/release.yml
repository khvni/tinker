name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate desktop version against tag
        id: version
        run: |
          set -euo pipefail
          version="$(node -e "const fs = require('node:fs'); const packageVersion = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8')).version; const tauriVersion = JSON.parse(fs.readFileSync('apps/desktop/src-tauri/tauri.conf.json', 'utf8')).version; if (packageVersion !== tauriVersion) { throw new Error(\`apps/desktop/package.json (\${packageVersion}) does not match apps/desktop/src-tauri/tauri.conf.json (\${tauriVersion}).\`); } process.stdout.write(tauriVersion);")"
          expected="v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} must match desktop version ${expected}." >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create draft release if needed
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --title "Tinker v${{ steps.version.outputs.version }}" \
              --generate-notes
          fi
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" --jq '.id')"
          echo "id=${release_id}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Keep uploads serialized so the final latest.json contains every platform bundle.
      max-parallel: 1
      matrix:
        include:
          - name: macOS arm64
            runner: macos-15
            target: aarch64-apple-darwin
            bundle_targets: app,dmg
          - name: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            bundle_targets: app,dmg
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_targets: nsis
          - name: Linux x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_targets: appimage
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate updater signing inputs
        shell: bash
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for name in TAURI_UPDATER_PUBLIC_KEY TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "${name} is required for updater artifact signing." >&2
              exit 1
            fi
          done

      - name: Validate macOS signing inputs
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "${name} is required for macOS signing and notarization." >&2
              exit 1
            fi
          done

      - name: Write release-only Tauri config
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          TINKER_RELEASE_BUNDLE_TARGETS: ${{ matrix.bundle_targets }}
          TINKER_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        working-directory: apps/desktop
        run: pnpm exec node ./scripts/write-release-config.mjs

      - name: Build desktop bundles and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          CI: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          args: >-
            --config src-tauri/tauri.release.conf.json
            --target ${{ matrix.target }}
